# docker-compose.yml — Hermes backend para deploy no Coolify
#
# Adaptado do compose oficial (NousResearch/hermes-agent) para o MODELO COOLIFY:
#   - SEM network_mode: host  (Coolify roteia por rede bridge própria + Traefik)
#   - SEM bind 127.0.0.1       (dashboard binda 0.0.0.0 DENTRO do container)
#   - SEM ports: publicados     (usa expose: — só a rede interna vê a porta;
#                                o Traefik do Coolify termina TLS e roteia.
#                                NUNCA use ports:, senão a 9119 vaza no host)
#
# ──────────────────────────────────────────────────────────────────────────
# ARQUITETURA (consolidada em 21/06): UM ÚNICO container roda o gateway E o
# dashboard. Antes eram DOIS serviços (gateway + dashboard) separados — e isso
# era a raiz de toda a dor com o WhatsApp:
#
#   O adapter do WhatsApp (plugins/platforms/whatsapp/adapter.py) só REAPROVEITA
#   uma bridge existente se ela responder em http://127.0.0.1:3000/health, ou
#   seja, no MESMO localhost. Dois containers NÃO compartilham localhost → o
#   dashboard nunca achava a bridge do gateway; se tentasse usar WhatsApp, subia
#   uma 2ª bridge na mesma sessão → "stream:error replaced" / reason 440 (a
#   conexão boa caía). Por isso tínhamos posto WHATSAPP_ENABLED=false no
#   dashboard — o que, por sua vez, fazia o web_server FILTRAR o WhatsApp do
#   status (mostra só plataformas habilitadas no próprio container) e o bot
#   "não enxergava" a conexão.
#
#   SOLUÇÃO: a imagem já foi feita pra rodar os dois juntos. O CMD `gateway run`
#   é o programa principal (sobe a ÚNICA bridge) e o dashboard sobe como SERVIÇO
#   s6 LATERAL no mesmo container, ligado por HERMES_DASHBOARD=1 (ver
#   docker/s6-rc.d/dashboard/run). Compartilhando localhost + PID:
#     - o dashboard REAPROVEITA a bridge do gateway (sem 2ª conexão);
#     - enxerga o gateway vivo (mesmo PID namespace) → mostra WhatsApp conectado;
#     - WHATSAPP_ENABLED=true é único, sem risco de conflito.
#   Resultado: WhatsApp funciona tanto pelo gateway quanto pelo dashboard.
# ──────────────────────────────────────────────────────────────────────────
#
# IMAGEM: vem do REGISTRY ghcr.io/gutterhiro/hermes-agent, construída pelo
#   GitHub Actions (.github/workflows/build-fork-image.yml). Coolify só faz PULL
#   (~1GB), não builda → não estoura o disco de 38GB. `pull_policy: always`
#   garante que o redeploy puxe a versão nova de :latest.
#   ATUALIZAR o Hermes:
#     1) sincronizar este fork com o upstream NousResearch/hermes-agent
#     2) o Actions builda e publica a imagem nova automaticamente
#     3) redeploy no Coolify → puxa a nova
#   Para deploy DETERMINÍSTICO, troque :latest pela tag de SHA publicada.
#
# Segurança: o dashboard sobe SEM --insecure → a auth OAuth (Nous Portal) liga
#   sozinha em bind não-loopback quando HERMES_DASHBOARD_OAUTH_CLIENT_ID está
#   setado. Jamais setar HERMES_DASHBOARD_INSECURE=1 aqui: desligaria o login.

services:
  hermes:
    image: ghcr.io/gutterhiro/hermes-agent:latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - "9119"
    volumes:
      - hermes-data:/opt/data
      # Espelha o MESMO volume em /opt/hermes/.hermes: processos que resolvem o
      # home p/ /opt/hermes/.hermes (read-only) passam a ler/escrever o home real
      # (/opt/data). Corrige "[Errno 13] /opt/hermes/.hermes" SEM fragmentar dados.
      - hermes-data:/opt/hermes/.hermes
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - AZURE_FOUNDRY_API_KEY=${AZURE_FOUNDRY_API_KEY:?set no Coolify}
      - AZURE_FOUNDRY_BASE_URL=${AZURE_FOUNDRY_BASE_URL:-https://personal-gutter-resource.openai.azure.com/openai/v1}
      # WhatsApp habilitado (bridge Baileys sobe no processo `gateway run`).
      # Agora é seguro =true porque há UM só container/localhost → uma só bridge.
      # NÃO duplicar WHATSAPP_ENABLED no /opt/data/.env (override=True venceria).
      - WHATSAPP_ENABLED=true
      # HOME/HERMES_HOME ancorados no volume gravável (não em /opt/hermes RO).
      - HOME=/opt/data
      - HERMES_HOME=/opt/data
      # Dashboard como SERVIÇO s6 lateral NESTE mesmo container (compartilha
      # localhost+PID com o gateway → reaproveita a bridge, enxerga o status).
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      # PUBLIC_URL fixo COM https:// — o OAuth monta redirect_uri = PUBLIC_URL +
      # /auth/callback, que precisa bater EXATO com o registrado no Nous.
      - HERMES_DASHBOARD_PUBLIC_URL=https://hermes.iamthalles.com
      - HERMES_DASHBOARD_OAUTH_CLIENT_ID=${HERMES_DASHBOARD_OAUTH_CLIENT_ID:?set no Coolify}
    # Programa principal = gateway (mensageria + bridge WhatsApp). O dashboard
    # roda em paralelo como serviço s6 (HERMES_DASHBOARD=1 acima). NÃO
    # sobrescrever 'entrypoint': a imagem usa /init (s6-overlay) como PID 1.
    command: ["gateway", "run"]
    # Labels Traefik EXPLÍCITOS — espelham o padrão comprovado nesta VPS (o
    # próprio coolify.iamthalles.com usa exatamente esta forma: router https +
    # Host + tls + certresolver letsencrypt + loadbalancer.server.port). O
    # coolify-proxy (Traefik v3.6) já está na rede deste recurso → alcança a 9119.
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.hermes-dashboard-https.rule=Host(`hermes.iamthalles.com`)'
      - traefik.http.routers.hermes-dashboard-https.entrypoints=https
      - traefik.http.routers.hermes-dashboard-https.tls=true
      - traefik.http.routers.hermes-dashboard-https.tls.certresolver=letsencrypt
      - traefik.http.services.hermes-dashboard.loadbalancer.server.port=9119

volumes:
  hermes-data:
    name: hermes-data
